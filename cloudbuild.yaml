steps:
  # Budowanie obrazu za pomocą Google Cloud Buildpacks (wykrywa Gradle i Java 21)
  - name: 'gcr.io/k8s-skaffold/pack'
    entrypoint: 'pack'
    args:
      - 'build'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_REPO_NAME/cloudsql-app:latest'
      - '--builder'
      - 'gcr.io/buildpacks/builder:google-22'
      - '--env'
      - 'GOOGLE_RUNTIME_VERSION=21'

  # Wypychanie obrazu do Artifact Registry przed wdrożeniem
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_HOSTNAME/$PROJECT_ID/$_REPO_NAME/cloudsql-app:latest']

  # Wdrożenie do Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_REPO_NAME/cloudsql-app:latest'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '$_CLOUDSQL_INSTANCE'
      - '--set-env-vars'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://localhost/cloudsql?socketFactory=org.postgresql.socket.UnixSocketFactory&socketFactoryArg=/cloudsql/$_CLOUDSQL_INSTANCE,SPRING_DATASOURCE_USERNAME=$_DB_USER'
      - '--set-secrets'
      - 'SPRING_DATASOURCE_PASSWORD=db-password:latest'

# Automatycznie wypychamy zbudowany obraz do Artifact Registry
images:
  - '$_AR_HOSTNAME/$PROJECT_ID/$_REPO_NAME/cloudsql-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _AR_HOSTNAME: 'europe-central2-docker.pkg.dev'
  _REPO_NAME: 'learning-cloudsql'
  _SERVICE_NAME: 'cloudsql-app'
  _DEPLOY_REGION: 'europe-central2'
  _CLOUDSQL_INSTANCE: 'pwujczyk-net-1:us-central1:pw-learning-sql'
  _DB_USER: 'postgres'